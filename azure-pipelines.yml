trigger:

  - main
 
variables:

  azureServiceConnectionId: "596ec8ae-7576-4f64-a67a-651a28356fcd"

  webAppName: "E-commSemanticSearch"

  pythonVersion: "3.11"
 
stages:

- stage: Build

  displayName: "Build Stage"

  jobs:

  - job: BuildJob

    pool:

      name: selfhosted-pool   # Self-hosted pool

    steps:

    - script: |

        echo Python Version

        python --version

      displayName: "Check Python"
 
    - script: |

        python -m pip install --upgrade pip

        pip install -r requirements.txt

      displayName: "Install Dependencies"
 
    - task: ArchiveFiles@2

      displayName: "Archive Files"

      inputs:

        rootFolderOrFile: "."

        includeRootFolder: false

        archiveType: zip

        archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"

        replaceExistingArchive: true
 
    - publish: "$(Build.ArtifactStagingDirectory)/app.zip"

      artifact: drop
 
- stage: Deploy

  displayName: "Deploy Stage"

  dependsOn: Build

  condition: succeeded()

  jobs:

  - deployment: DeploymentJob

    pool:

      name: selfhosted-pool   # Self-hosted pool again

    environment: E-commSemanticSearch

    strategy:

      runOnce:

        deploy:

          steps:

          - task: AzureWebApp@1

            displayName: "Deploy to Azure Web App"

            inputs:

              azureSubscription: "$(azureServiceConnectionId)"

              appType: webAppLinux

              appName: "$(webAppName)"

              package: "$(Pipeline.Workspace)/drop/app.zip"
 